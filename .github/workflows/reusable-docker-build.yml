---
name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      registry:
        description: 'Container registry (e.g., docker.io)'
        required: true
        type: string
        default: 'docker.io'
      image_name:
        description: 'Image name (e.g., username/repo)'
        required: true
        type: string
      platforms:
        description: 'Comma-separated platforms'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      push:
        description: 'Whether to push the image'
        required: false
        type: boolean
        default: true
      tags:
        description: 'Additional tags (newline separated)'
        required: false
        type: string
        default: ''
      scan_image:
        description: 'Whether to run security scan'
        required: false
        type: boolean
        default: true
    outputs:
      image_digest:
        description: 'Digest of the built image'
        value: ${{ jobs.build.outputs.image_digest }}
      image_tag:
        description: 'Primary tag of the built image'
        value: ${{ jobs.build.outputs.image_tag }}

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry }}/${{ inputs.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            ${{ inputs.tags }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Run Trivy vulnerability scanner
        if: >-
          ${{ inputs.push && inputs.scan_image &&
          github.event_name != 'pull_request' }}
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: >-
            ${{ inputs.registry }}/${{ inputs.image_name }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy scan results
        if: >-
          ${{ inputs.push && inputs.scan_image &&
          github.event_name != 'pull_request' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
