---
name: CD - Build and Push to Docker Hub

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  # Disabled for pull requests to prevent failures due to missing secrets
  # and to ensure images are only pushed from trusted main branch
  # pull_request:
  #   branches: [main]

jobs:
  call-docker-build:
    uses: ./.github/workflows/reusable-docker-build.yml
    secrets: inherit
    with:
      registry: docker.io
      image_name: anydockerhub/dcontainer
      platforms: linux/amd64,linux/arm64,linux/arm/v7
      push: ${{ github.event_name != 'pull_request' }}
      scan_image: ${{ github.event_name != 'pull_request' }}
      tags: |
        type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
