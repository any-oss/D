# CI - Lint and Type Check

name: CI - Lint and Type Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run linters
        run: |
          flake8 api core --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 api core --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Run type checking
        run: mypy api core --ignore-missing-imports
