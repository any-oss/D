name: PR - Build and Deploy Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'deploy-preview') || github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=pr
            type=sha,prefix=pr-${{ github.event.pull_request.number }}-
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            ENVIRONMENT=preview
            PR_NUMBER=${{ github.event.pull_request.number }}
      
      - name: Image digest
        run: echo ${{ steps.meta.outputs.digest }}
      
      - name: Comment PR with image info
        uses: actions/github-script@v7
        with:
          script: |
            const imageTag = `ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }}-${{ github.sha }}`;
            const shortSha = '${{ github.sha }}'.substring(0, 7);
            
            const comment = `## 🚀 PR Deployment Ready
            
            ### Docker Image Built
            - **Image**: \`${imageTag}\`
            - **SHA**: \`${shortSha}\`
            - **PR**: #${{ github.event.pull_request.number }}
            
            ### Next Steps
            1. Deploy to preview environment using:
               \`\`\`bash
               docker run -p 8000:8000 ${imageTag}
               \`\`\`
            2. Or deploy to Kubernetes/Staging with this image tag
            
            ---
            *Automated by PR Deploy Workflow*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  security-scan:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
  
  test:
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          pytest --cov=api --cov=core --cov-report=xml
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: pr-tests
          fail_ci_if_error: false

  deploy-preview:
    runs-on: ubuntu-latest
    needs: [build-and-push, security-scan, test]
    if: success() && contains(github.event.pull_request.labels.*.name, 'deploy-preview')
    environment:
      name: preview-pr-${{ github.event.pull_request.number }}
      url: https://pr-${{ github.event.pull_request.number }}.preview.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Deploy to Preview Environment
        run: |
          echo "🚀 Deploying PR #${{ github.event.pull_request.number }} to preview environment"
          echo "Image: ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }}-${{ github.sha }}"
          # Add your deployment commands here (kubectl, helm, terraform, etc.)
          # Example:
          # kubectl set image deployment/api api=ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
      
      - name: Update PR with deployment status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ Preview Deployment Successful
              
              Your PR has been deployed to the preview environment!
              
              **Environment**: preview-pr-${{ github.event.pull_request.number }}
              **URL**: https://pr-${{ github.event.pull_request.number }}.preview.example.com
              **Image**: \`ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }}-${{ github.sha }}\`
              
              The preview will be automatically destroyed when the PR is closed or merged.`
            });
