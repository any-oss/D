---
name: Release - Version Tag and Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Validate version format
        id: validate
        run: |
          if [[ ! "${{ github.event.inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format. Use vX.Y.Z (e.g., v1.0.0)"
            exit 1
          fi
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          echo "✅ Version validated: ${{ github.event.inputs.version }}"

  create-tag:
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.validate-version.outputs.version }}" -m "Release ${{ needs.validate-version.outputs.version }}"
          git push origin "${{ needs.validate-version.outputs.version }}"
          echo "✅ Tag ${{ needs.validate-version.outputs.version }} created and pushed"

  build-release:
    needs: [validate-version, create-tag]
    uses: ./.github/workflows/reusable-docker-build.yml
    secrets: inherit
    with:
      registry: docker.io
      image_name: anydockerhub/dcontainer
      platforms: linux/amd64,linux/arm64
      push: true
      scan_image: true
      tags: |
        type=raw,value=${{ needs.validate-version.outputs.version }}
        type=raw,value=latest

  create-release:
    needs: [validate-version, build-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-version.outputs.version }}
          name: Release ${{ needs.validate-version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
